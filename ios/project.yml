name: Saison
options:
  bundleIdPrefix: com.saadzniber
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_PREVIEWS: YES

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  Saison:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Saison
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.saadzniber.saison
      PRODUCT_NAME: Saison
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: "5.9"
      INFOPLIST_FILE: Sources/Saison/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    info:
      path: Sources/Saison/Info.plist
      properties:
        CFBundleName: Saison
        CFBundleDisplayName: Saison
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationIsSceneBasedLifecycle: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        GIDClientID: "813519378689-8omfmqanfvtad2cupuohsvufl2n3laug.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.813519378689-8omfmqanfvtad2cupuohsvufl2n3laug"
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

schemes:
  Saison:
    build:
      targets:
        Saison: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
